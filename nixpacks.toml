# Railway build configuration (Nixpacks).
#
# This service's builder is pinned to Nixpacks, which provisions Node 22.19.0
# for the Node 22 series. That Node ships an old corepack which cannot launch
# pnpm v11 (pure ESM): it loads pnpm's `pnpm.cjs` shim in a `vm` context without
# a dynamic-import callback and crashes before install starts, with
# ERR_VM_DYNAMIC_IMPORT_CALLBACK_MISSING. Nixpacks pins Node by major version
# only, so a `.node-version` patch bump cannot pull in a newer (fixed) corepack.
#
# Run pnpm via `npx pnpm@11.5.0` instead: npx executes pnpm's bin directly with
# node (no corepack `vm`), so the dynamic import resolves normally, and it pins
# the exact version regardless of whatever pnpm happens to be on PATH. Node
# 22.19.0 is below the repo's `engines.node` (>=22.22.3) but is functionally
# fine, so disable the strict engine check for the build only.
[phases.install]
cmds = [
  "npx --yes pnpm@11.5.0 install --frozen-lockfile --prefer-offline --config.engine-strict=false",
]
