<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2025 Annual Developer Survey</title>
    <!-- Paint the theme's backdrop colour before the JS bundle loads so a dark-mode visitor
         doesn't see a flash of white while the app boots. Values mirror theme.ts
         (background.default): light rgb(250, 250, 246), dark #1e293b. `color-scheme` also keeps
         the browser's native canvas/scrollbars in step with the OS preference. -->
    <style>
      :root {
        color-scheme: light dark;
      }
      html {
        background-color: rgb(250, 250, 246);
      }
      @media (prefers-color-scheme: dark) {
        html {
          background-color: #1e293b;
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
